{% extends "base.html" %}
{% block title %}Register - FreshBites Bakery{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-4 p-4">
            <h2 class="text-center mb-4">Create an Account</h2>
            <form method="POST" action="{{ url_for('register_page') }}">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-order w-100">Register</button>
            </form>
            <div class="mt-4 text-center">
                <p class="small text-muted">Already have an account? <a href="{{ url_for('login_page') }}">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
