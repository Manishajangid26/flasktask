{% extends "base.html" %}

{% block title %}Contact Us - FreshBites Bakery{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="text-center mb-4">
            <h1 style="font-family: 'Playfair Display', serif; color: var(--primary-green);">Contact Us</h1>
            <p class="text-muted">Questions, custom cakes, or bulk orders — send a message. We store it in our SQLite database.</p>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <form method="post" action="{{ url_for('contact_page') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" name="name" required
                            placeholder="Your name">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required
                            placeholder="you@example.com">
                    </div>
                    <div class="mb-4">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" name="message" rows="4" required
                            placeholder="How can we help?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-order">Send message</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
